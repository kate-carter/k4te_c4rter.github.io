<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <div class="shell">
      <header class="site-header">
        <a class="back-link" href="{{ '/' | relative_url }}">back to hello</a>
        <h1 class="site-title">{{ site.title }}</h1>
        <p class="site-subtitle">{{ site.description }}</p>
      </header>

      <nav class="main-nav" aria-label="Main navigation">
        {% for item in site.data.navigation %}
          <a href="{{ item.url | relative_url }}">{{ item.label }}</a>
        {% endfor %}
      </nav>

      <main class="content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <button id="fontToggle" class="font-toggle" type="button" aria-label="Toggle font family">
          toggle font
        </button>
      </footer>
    </div>
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
